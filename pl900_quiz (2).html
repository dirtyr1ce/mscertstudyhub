<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL-900 Practice Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --card: #161b24;
    --border: #1e2535;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --correct: #10b981;
    --text: #e8eaf0;
    --muted: #6b7280;
    --tag: #1a2540;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0 0 80px;
    overflow-x: hidden;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #0a0f1e 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 200px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .badge {
    display: inline-block;
    background: var(--tag);
    border: 1px solid rgba(0,212,255,0.25);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  /* Progress bar */
  .progress-wrap {
    max-width: 760px;
    margin: 28px auto 0;
    padding: 0 24px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Cards */
  .quiz-container {
    max-width: 760px;
    margin: 36px auto 0;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(0,212,255,0.2); }
  .card.revealed { border-color: rgba(16,185,129,0.3); }

  .card-header {
    padding: 22px 24px 18px;
    cursor: default;
  }
  .q-number {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .q-number::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .q-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 400;
  }
  .q-note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    font-style: italic;
  }

  /* Options */
  .options {
    padding: 0 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    transition: background 0.3s, border-color 0.3s;
  }
  .option-label {
    min-width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    background: var(--tag);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option.correct {
    background: rgba(16,185,129,0.08);
    border-color: rgba(16,185,129,0.4);
  }
  .option.correct .option-label {
    background: rgba(16,185,129,0.2);
    color: var(--correct);
  }
  .option.correct .option-text {
    color: #a7f3d0;
  }
  .checkmark {
    margin-left: auto;
    color: var(--correct);
    font-size: 14px;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.3s, transform 0.3s;
    flex-shrink: 0;
  }
  .option.correct .checkmark {
    opacity: 1;
    transform: scale(1);
  }

  /* Hotspot answer */
  .hotspot-answers {
    padding: 0 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .hotspot-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    line-height: 1.5;
    transition: background 0.3s, border-color 0.3s;
  }
  .hotspot-row.yes-row {
    background: rgba(16,185,129,0.08);
    border-color: rgba(16,185,129,0.4);
  }
  .hotspot-row.no-row {
    background: rgba(239,68,68,0.06);
    border-color: rgba(239,68,68,0.25);
  }
  .verdict {
    min-width: fit-content;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-top: 2px;
    text-align: center;
  }
  .verdict.yes { background: rgba(16,185,129,0.2); color: var(--correct); }
  .verdict.no  { background: rgba(239,68,68,0.15); color: #f87171; }

  /* Answer section (hidden by default) */
  .answer-section {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .answer-section.visible {
    max-height: 600px;
  }

  /* Reveal button */
  .card-footer {
    padding: 0 24px 20px;
  }
  .reveal-btn {
    width: 100%;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .reveal-btn:hover {
    background: rgba(0,212,255,0.07);
    border-color: var(--accent);
  }
  .reveal-btn.hidden-state {
    display: none;
  }
  .reveal-btn .btn-icon {
    transition: transform 0.3s;
  }

  /* Summary bar */
  .summary {
    max-width: 760px;
    margin: 32px auto 0;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .summary-stat {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .summary-stat span {
    color: var(--accent);
    font-weight: 600;
  }
  .reveal-all-btn {
    padding: 8px 20px;
    background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(124,58,237,0.12));
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reveal-all-btn:hover {
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(124,58,237,0.2));
    border-color: var(--accent);
  }

  /* Hide verdict badges before reveal */
  .verdict-hidden {
    visibility: hidden;
    width: 38px;
  }

  /* Animations */
  .card {
    animation: cardIn 0.4s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.30s; }
  .card:nth-child(7) { animation-delay: 0.35s; }
  .card:nth-child(8) { animation-delay: 0.40s; }
  .card:nth-child(9) { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.50s; }
  .card:nth-child(11) { animation-delay: 0.55s; }
  .card:nth-child(12) { animation-delay: 0.60s; }
  .card:nth-child(13) { animation-delay: 0.65s; }
  .card:nth-child(14) { animation-delay: 0.70s; }
  .card:nth-child(15) { animation-delay: 0.75s; }
  .card:nth-child(16) { animation-delay: 0.80s; }
  .card:nth-child(17) { animation-delay: 0.85s; }
  .card:nth-child(18) { animation-delay: 0.90s; }
  .card:nth-child(19) { animation-delay: 0.95s; }
  .card:nth-child(20) { animation-delay: 1.00s; }
  .card:nth-child(21) { animation-delay: 1.05s; }
  .card:nth-child(22) { animation-delay: 1.10s; }
  .card:nth-child(23) { animation-delay: 1.15s; }
  .card:nth-child(65) { animation-delay: 1.20s; }
  .card:nth-child(66) { animation-delay: 1.25s; }
  .card:nth-child(67) { animation-delay: 1.30s; }
  .card:nth-child(68) { animation-delay: 1.35s; }
  .card:nth-child(69) { animation-delay: 1.40s; }
  .card:nth-child(70) { animation-delay: 1.45s; }
  .card:nth-child(71) { animation-delay: 1.50s; }
  .card:nth-child(n+72) { animation-delay: 1.55s; }

  /* Explanation panel */
  .explanation {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .explanation.visible {
    max-height: 300px;
  }
  .explanation-inner {
    margin: 0 24px 20px;
    padding: 12px 16px;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    color: #a0b4c8;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .exp-icon {
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .card:nth-child(24) { animation-delay: 1.20s; }
  .card:nth-child(25) { animation-delay: 1.25s; }
  .card:nth-child(26) { animation-delay: 1.30s; }
  .card:nth-child(27) { animation-delay: 1.35s; }
  .card:nth-child(28) { animation-delay: 1.40s; }
  .card:nth-child(29) { animation-delay: 1.45s; }
  .card:nth-child(30) { animation-delay: 1.50s; }
  .card:nth-child(31) { animation-delay: 1.55s; }
  .card:nth-child(32) { animation-delay: 1.60s; }
  .card:nth-child(33) { animation-delay: 1.65s; }
  .card:nth-child(34) { animation-delay: 1.70s; }
  .card:nth-child(35) { animation-delay: 1.75s; }
  .card:nth-child(36) { animation-delay: 1.80s; }
  .card:nth-child(37) { animation-delay: 1.85s; }
  .card:nth-child(38) { animation-delay: 1.90s; }
  .card:nth-child(39) { animation-delay: 1.95s; }
  .card:nth-child(40) { animation-delay: 2.00s; }

</style>
</head>
<body>

<header>
  <div class="badge">Microsoft Power Platform</div>
  <h1>PL-<span>900</span> Practice Quiz</h1>
  <p class="subtitle">Fundamentals Certification · 229 Questions</p>
  <div class="progress-wrap">
    <div class="progress-info">
      <span>Progress</span>
      <span id="progress-text">0 / 229 revealed</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
</header>

<div class="summary">
  <span class="summary-stat">Revealed: <span id="revealed-count">0</span> of 229</span>
  <button class="reveal-all-btn" onclick="revealAll()">Reveal All Answers</button>
</div>

<div class="quiz-container" id="quiz"></div>

<script>
const questions = [
  {
    id: 1,
    text: "You are a sales representative. You create Power BI reports to visualize data from a Microsoft Excel workbook. Users need to be able to view and share the report. Which two actions should you perform?",
    note: "Each correct answer presents part of the solution.",
    type: "mcq",
    options: [
      { label: "A", text: "Pin the report to the dashboard" },
      { label: "B", text: "Export the data" },
      { label: "C", text: "Publish the dashboard" },
      { label: "D", text: "Share the dashboard" },
    ],
    correct: ["A", "D"],
    explanation: "Pin the report (A) makes it visible on a dashboard. Share the dashboard (D) grants co-workers access. Exporting data (B) doesn't enable sharing; publishing (C) is for making reports available in the service, not sharing with specific users."
  },
    id: 2,
    text: "You create reports within Power BI to report on the status of a project. The manager asks you to share the reports with other team members. You decide to create a published app and set permissions to allow other team members to view the reports. For each of the following statements, select Yes if true, otherwise select No.",
    type: "hotspot",
    statements: [
      { text: "A Power BI published app is stored within the team site so that others can install it.", answer: "YES" },
      { text: "One of the other project managers installs and modifies a dashboard within the Power BI published app. The changes are automatically made to the original published app.", answer: "NO" },
    ],
    explanation: "Power BI published apps are stored in workspaces (not team sites), but users install them like apps — hence Yes. When a user modifies a dashboard in a published app, those changes are local to their copy only and do NOT affect the original — hence No."
  },
    id: 3,
    text: "You create a Power Apps portal. When the user signs into the portal, the following error displays: \"User not found.\" You confirm that the user sign-in information is correct. You need to determine the cause of the error. What should you do?",
    type: "mcq",
    options: [
      { label: "A", text: "Disable custom error message" },
      { label: "B", text: "Create custom error message" },
      { label: "C", text: "Enable diagnostic tools in Lifecycle Services" },
      { label: "D", text: "Enable maintenance mode" },
    ],
    correct: ["C"],
    explanation: "Disabling custom error messages in the Power Apps/Pages admin center replaces the generic 'User not found' message with detailed error information, helping identify the root cause. Lifecycle Services (C) is related to Dynamics 365 F&O, not Power Apps portals — though this is disputed."
  },
    id: 4,
    text: "A company uses Dynamics 365 Supply Chain Management. The company wants to build custom user interfaces with additional functionality. You need to recommend a solution to the company. What should you recommend?",
    type: "mcq",
    options: [
      { label: "A", text: "Power BI" },
      { label: "B", text: "Power Apps canvas app" },
      { label: "C", text: "AI Builder" },
      { label: "D", text: "Microsoft Flow" },
    ],
    correct: ["B"],
    explanation: "Power Apps canvas apps allow building custom user interfaces with additional functionality on top of Dynamics 365 data. Power BI is for analytics, AI Builder is for AI models, and Microsoft Flow (Power Automate) is for automation — none build UIs."
  },
    id: 5,
    text: "You create a canvas app that allows contractors to submit time they work against a project. Contractors must be able to use the canvas app to enter time. Contractors must not be able to perform any other actions in the app. You need to configure permissions for the contractors. Which type of permission should you use?",
    type: "mcq",
    options: [
      { label: "A", text: "Application level" },
      { label: "B", text: "Task level" },
      { label: "C", text: "Record level" },
      { label: "D", text: "Field level" },
    ],
    correct: ["D"],
    explanation: "Field-level security provides the most granular control, restricting access to specific fields. Since contractors must only enter time (a specific field action) and nothing else, field-level is the most precise permission type."
  },
    id: 6,
    text: "You are working with Microsoft Flow. You create a flow that extracts birth dates of users and then sends birthday greeting emails on their birthday. The flow does not properly extract birth dates. Where should you make changes?",
    note: "⚠️ Disputed: Official suggested answer is A (Connectors — specifically the Date Time connector for timezone/date conversion). However, many community sources argue B (Expressions) since the issue is data extraction logic. Both are defensible.",
    type: "mcq",
    options: [
      { label: "A", text: "Connectors" },
      { label: "B", text: "Expressions" },
      { label: "C", text: "Templates" },
    ],
    correct: ["A"],
    explanation: "The Date Time connector in Power Automate provides actions to convert time zones, format dates, and handle date arithmetic. Since birth date extraction fails, the connector handling date/time data needs to be fixed. (Note: Expressions is also debated as the answer.)"
  },
    id: 7,
    text: "A company has a website that includes a form to collect information about leads. You need to set up an automated workflow to create leads in Dynamics 365 Sales when leads are submitted on the company's custom website. What should you create?",
    type: "mcq",
    options: [
      { label: "A", text: "Task flow" },
      { label: "B", text: "Power Automate flow" },
      { label: "C", text: "Dynamics 365 workflow" },
      { label: "D", text: "Business process flow" },
    ],
    correct: ["B"],
    explanation: "Power Automate flow can be triggered by a form submission on a custom website and automatically create a lead record in Dynamics 365 Sales. Task flows and business process flows guide users through steps; Dynamics 365 workflows are older on-premise tools."
  },
    id: 8,
    text: "You have a Power Apps app. You create a new version of the app and then publish the new version. The customer goes through the process of restoring the previous version of the app. In the Version tab for the app, you will see <u>two</u> versions of the app. If the underlined text makes the statement correct, select \"No change is needed.\" If incorrect, select the answer that makes it correct.",
    note: "Evaluate the underlined text and select the correct answer.",
    type: "mcq",
    options: [
      { label: "A", text: "No change is needed" },
      { label: "B", text: "One" },
      { label: "C", text: "Three" },
      { label: "D", text: "Four" },
    ],
    correct: ["C"],
    explanation: "When you restore a previous version, the restored version becomes a new (published) version. So you end up with: the version before restore, the current version, and the newly restored version = three versions total."
  },
    id: 9,
    text: "You have a Power BI report. For each of the following statements, select Yes if the statement is true, otherwise select No.",
    type: "hotspot",
    statements: [
      { text: "You can export data from a visualization in a Power BI report.", answer: "YES" },
      { text: "You can show the data behind the visual report on your screen without exporting the data.", answer: "NO" },
      { text: "You can export data to view supporting data for a KPI.", answer: "YES" },
    ],
    explanation: "Power BI allows exporting data from visuals (Yes). You CAN show data behind a visual on screen without exporting using the 'Show data' feature (Yes). KPI visuals support data export for supporting data (Yes). Note: earlier quiz version had second statement as No."
  },
    id: 10,
    text: "You create a Power BI dashboard that displays data from Dynamics 365 Customer Engagement. You need to share the Power BI dashboard with co-workers. What are the three possible ways to achieve the goal?",
    note: "Each correct answer presents a complete solution.",
    type: "mcq",
    options: [
      { label: "A", text: "Create a Power BI workspace and grant co-workers permissions" },
      { label: "B", text: "Publish a dashboard as an app to your co-workers" },
      { label: "C", text: "Export the data into Common Data Service for others to manipulate in Power BI" },
      { label: "D", text: "Export the data in Microsoft Excel for co-workers to import and view in Power BI" },
      { label: "E", text: "Embed reports in your company's internal web portal" },
    ],
    correct: ["A", "B", "E"],
    explanation: "A workspace grants permissions to collaborate. Publishing as an app allows view-only distribution. Embedding in an internal web portal allows access through a company site. Exporting to Excel or Common Data Service doesn't constitute sharing the dashboard."
  },
    id: 11,

let revealedCount = 0;

function buildQuiz() {
  const container = document.getElementById('quiz');
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${q.id}`;

    let optionsHTML = '';
    if (q.type === 'mcq') {
      // Options always visible; correct class added on reveal
      optionsHTML = `<div class="options" id="options-${q.id}">` +
        q.options.map(o => `
          <div class="option" id="opt-${q.id}-${o.label}">
            <span class="option-label">${o.label}</span>
            <span class="option-text">${o.text}</span>
            <span class="checkmark">✓</span>
          </div>`).join('') +
        `</div>`;
    } else if (q.type === 'match') {
      optionsHTML = `<div class="hotspot-answers" id="options-${q.id}">` +
        q.pairs.map((p, i) => `
          <div class="hotspot-row" id="hrow-${q.id}-${i}">
            <span class="verdict yes verdict-hidden" id="verdict-${q.id}-${i}">${p.answer}</span>
            <span>${p.requirement}</span>
          </div>`).join('') +
        `</div>`;
    } else {
      // Hotspot: show statements always, but hide verdict badges until reveal
      optionsHTML = `<div class="hotspot-answers" id="options-${q.id}">` +
        q.statements.map((s, i) => `
          <div class="hotspot-row" id="hrow-${q.id}-${i}">
            <span class="verdict ${s.answer === 'YES' ? 'yes' : 'no'} verdict-hidden" id="verdict-${q.id}-${i}">${s.answer}</span>
            <span>${s.text}</span>
          </div>`).join('') +
        `</div>`;
    }

    card.innerHTML = `
      <div class="card-header">
        <div class="q-number">Question ${q.id}</div>
        <div class="q-text">${q.text}</div>
        ${q.note ? `<div class="q-note">${q.note}</div>` : ''}
      </div>
      ${optionsHTML}
      <div class="card-footer">
        <button class="reveal-btn" id="btn-${q.id}" onclick="reveal(${q.id})">
          <span class="btn-icon">▶</span> Reveal Answer
        </button>
      </div>
      <div class="explanation" id="explanation-${q.id}"></div>`;

    container.appendChild(card);
  });
}

function reveal(id) {
  const q = questions.find(x => x.id === id);
  const btn = document.getElementById(`btn-${id}`);
  const card = document.getElementById(`card-${id}`);

  if (card.classList.contains('revealed')) return;

  card.classList.add('revealed');
  btn.style.display = 'none';

  if (q.type === 'mcq') {
    q.correct.forEach(label => {
      const opt = document.getElementById(`opt-${id}-${label}`);
      if (opt) opt.classList.add('correct');
    });
  } else if (q.type === 'match') {
    q.pairs.forEach((p, i) => {
      const row = document.getElementById(`hrow-${id}-${i}`);
      const verdict = document.getElementById(`verdict-${id}-${i}`);
      if (row) row.classList.add('yes-row');
      if (verdict) verdict.classList.remove('verdict-hidden');
    });
  } else {
    // Hotspot: reveal verdict badges and row colors
    q.statements.forEach((s, i) => {
      const row = document.getElementById(`hrow-${id}-${i}`);
      const verdict = document.getElementById(`verdict-${id}-${i}`);
      if (row) row.classList.add(s.answer === 'YES' ? 'yes-row' : 'no-row');
      if (verdict) verdict.classList.remove('verdict-hidden');
    });
  }

  if (q.explanation) {
    const expEl = document.getElementById(`explanation-${id}`);
    if (expEl) {
      expEl.innerHTML = `<div class="explanation-inner"><span class="exp-icon">💡</span><span>${q.explanation}</span></div>`;
      expEl.classList.add('visible');
    }
  }

  revealedCount++;
  updateProgress();
}

function revealAll() {
  questions.forEach(q => reveal(q.id));
}

function updateProgress() {
  const total = questions.length;
  document.getElementById('revealed-count').textContent = revealedCount;
  document.getElementById('progress-text').textContent = `${revealedCount} / ${total} revealed`;
  document.getElementById('progress-fill').style.width = `${(revealedCount / total) * 100}%`;
}

buildQuiz();
</script>
